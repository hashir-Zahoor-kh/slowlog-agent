name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Typecheck (mypy --strict)
        run: uv run mypy --strict src

      - name: Test with coverage
        run: uv run pytest --cov-report=json --cov-report=term-missing --cov-fail-under=80

      - name: Enforce per-file coverage gates (>=90% on core modules)
        run: uv run python scripts/check_coverage_gates.py

  terraform:
    name: Terraform (fmt, validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.*"

      - name: terraform fmt -check
        run: terraform -chdir=terraform fmt -check -diff

      - name: terraform init (no backend, no credentials)
        run: terraform -chdir=terraform init -backend=false

      - name: terraform validate
        run: terraform -chdir=terraform validate
